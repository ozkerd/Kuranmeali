<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuran-ı Kerim Okuma ve Çeviri</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Lateef:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=7">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header blur-background">
            <div class="header-content">
                <select id="lang-select" class="speed-dropdown" style="margin-bottom: 10px; font-size: 0.9rem;">
                    <option value="tr" selected>🇹🇷 Türkçe</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="ur">🇵🇰 اردو (Urdu)</option>
                    <option value="bn">🇧🇩 বাংলা (Bengali)</option>
                    <option value="id">🇮🇩 Bahasa Indonesia</option>
                    <option value="hi">🇮🇳 हिन्दी (Hindi)</option>
                    <option value="ta">🇱🇰 தமிழ் (Tamil)</option>
                </select>
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <select id="chapter-select" class="chapter-dropdown">
                        <option value="1" selected>1. Al-Fatihah</option>
                        <!-- Options populated via JS -->
                    </select>
                    <select id="page-select" class="chapter-dropdown" style="font-size: 1.1rem;">
                        <!-- Options 1 to 604 populated via JS -->
                    </select>
                </div>
                <p class="subtitle">Kelime Kelime Türkçe Meal</p>
                <select id="reciter-select" class="chapter-dropdown"
                    style="font-size: 1.1rem; margin-top: 5px; opacity: 0.8;">
                    <option value="7" selected>Mishary Rashid Alafasy</option>
                    <option value="2">AbdulBaset AbdulSamad</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="4">Abu Bakr al-Shatri</option>
                    <option value="97">Yasser Ad-Dussary</option>
                </select>
            </div>

            <!-- Active Page Badge -->
            <div id="current-page-badge" class="verse-badge" style="margin-top: 15px; display: inline-block;">
                Sayfa 1
            </div>

            <!-- Action Bar (Search, Bookmarks, Download) -->
            <div class="action-bar" style="margin-top: 15px; display: flex; justify-content: center; gap: 15px;">
                <button id="btn-search" class="action-btn" aria-label="Arama">
                    <i class="fas fa-search"></i>
                </button>
                <button id="btn-bookmarks" class="action-btn" aria-label="Favoriler">
                    <i class="fas fa-bookmark"></i>
                </button>
                <button id="btn-download" class="action-btn" aria-label="Sureyi İndir">
                    <i class="fas fa-download"></i>
                </button>
            </div>

            <!-- Audio Player Controls -->
            <div class="player-controls">
                <button id="mute-btn" class="ctrl-btn" aria-label="Mute/Unmute"
                    style="font-size: 1.2rem; margin-right: 5px; color: var(--text-secondary);">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button id="play-pause-btn" class="ctrl-btn main-btn" aria-label="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
                    <span id="total-time">0:00</span>
                </div>
                <!-- Font Control -->
                <select id="font-select" class="speed-dropdown" title="Hat (Yazı Tipi)">
                    <option value="uthmani" selected>Medine Hattı</option>
                    <option value="indopak">Hayrat Hattı</option>
                </select>
                <!-- Speed Control -->
                <select id="speed-select" class="speed-dropdown" title="Oynatma Hızı">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2.0x</option>
                </select>
            </div>
        </header>

        <!-- Main Content Area: Verses -->
        <main class="quran-reader">
            <div id="verses-container" class="verses-container">
                <!-- Loading State -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Ayetler yükleniyor...</p>
                </div>
            </div>
        </main>

        <!-- Hidden Audio Element -->
        <audio id="quran-audio" preload="metadata"></audio>
    </div>
    <!-- Search Modal -->
    <div id="search-modal" class="modal hidden">
        <div class="modal-content blur-background">
            <div class="modal-header">
                <h3 id="modal-search-title">Arama</h3>
                <button class="close-modal" id="close-search" aria-label="Kapat"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="search-container" style="display:flex; gap: 10px;">
                    <input type="text" id="search-input" placeholder="Kuran'da ara..."
                        style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--highlight-border); background: var(--bg-tertiary); color: var(--text-primary); font-size: 1rem;">
                    <button id="execute-search-btn" class="main-btn" style="width: 48px; height: 48px;"><i
                            class="fas fa-search"></i></button>
                </div>
                <div id="search-results-container" style="margin-top: 20px; max-height: 50vh; overflow-y: auto;">
                    <!-- Results dynamically populated -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bookmarks Modal -->
    <div id="bookmarks-modal" class="modal hidden">
        <div class="modal-content blur-background">
            <div class="modal-header">
                <h3 id="modal-bookmarks-title">Favoriler</h3>
                <button class="close-modal" id="close-bookmarks" aria-label="Kapat"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="bookmarks-list-container" style="max-height: 50vh; overflow-y: auto;">
                    <!-- Bookmarks dynamically populated -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=7"></script>
</body>

</html>
